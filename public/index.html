<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Grid Strider</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="hud">
        <h1>Neon Grid Strider</h1>
        <div class="controls">
          <label>
            Nome
            <input id="username" maxlength="24" placeholder="Runner_01" />
          </label>
          <label>
            Cor
            <input id="color" type="color" value="#00e5ff" />
          </label>
          <button id="joinBtn">Entrar no jogo</button>
        </div>
        <p>Use as setas ou WASD para se mover.</p>
      </section>
      <canvas id="gameCanvas" width="1000" height="600"></canvas>
      
      <section class="chat-container">
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-area">
          <input id="chatInput" type="text" placeholder="Pressione Enter para falar..." maxlength="50" />
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="js/game.js"></script>
  </body>
</html>
