<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b0f1a" />
    <title>Neon Grid Strider</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="hud">
        <h1>Neon Grid Strider</h1>
        <div class="controls">
          <label>
            Nome
            <input id="username" maxlength="24" placeholder="Runner_01" />
          </label>
          <label>
            Cor
            <input id="color" type="color" value="#00e5ff" />
          </label>
          <button id="joinBtn">Entrar no jogo</button>
        </div>
        <p class="info-text">Use o joystick para se mover.</p>
      </section>
      
      <div class="game-container">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        
        <!-- Joystick Virtual -->
        <div id="joystickZone" class="joystick-zone">
          <div id="joystickBase" class="joystick-base">
            <div id="joystickStick" class="joystick-stick"></div>
          </div>
        </div>

        <!-- Botões de Ação -->
        <div class="action-buttons">
          <button id="jumpBtn" class="action-btn jump-btn" touch-action="none">
            <span class="btn-icon">⬆️</span>
            <span class="btn-label">Pular</span>
          </button>
          <button id="attackBtn" class="action-btn attack-btn" touch-action="none">
            <span class="btn-icon">⚡</span>
            <span class="btn-label">Atacar</span>
          </button>
        </div>

        <!-- Chat Global -->
        <section class="chat-container">
          <div id="chatMessages" class="chat-messages"></div>
          <div class="chat-input-area">
            <input id="chatInput" type="text" placeholder="Chat..." maxlength="50" />
          </div>
        </section>
      </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="js/game.js"></script>
  </body>
</html>
